<!DOCTYPE html>
<html lang="es" class="notranslate">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temporizadores Age of Empires IV</title>

<style>
body{
background:#0e0e0e;
color:white;
font-family:Arial;
padding:30px;
}

h1{
text-align:center;
margin-bottom:30px;
}

button{
padding:14px 24px;
font-size:17px;
font-weight:bold;
letter-spacing:0.5px;
cursor:pointer;
color:#f5e6c8;
background:linear-gradient(180deg,#7a4b1d,#4e2f12);
border:2px solid #c9a44b;
border-radius:6px;
margin-bottom:0;
max-width:100%;
box-shadow:0 3px 0 #2a1808, 0 6px 12px rgba(0,0,0,0.5);
transition:all 0.15s ease;
}

button:hover{
background:linear-gradient(180deg,#8a5a2a,#5a3616);
transform:translateY(-1px);
}

button:active{
transform:translateY(2px);
box-shadow:0 1px 0 #2a1808;
}

.timer{
margin-bottom:30px;
}

.title{
font-size:18px;
margin-bottom:5px;
}

.barContainer{
width:100%;
height:30px;
background:#333;
border-radius:5px;
overflow:hidden;
}

.bar{
height:100%;
width:100%;
background:linear-gradient(90deg,#00ff88,#00aaff);
transition:width 1s linear;
}

.time{
font-size:13px;
margin-top:4px;
color:#aaa;
}

.ready{
color:#00ff88;
font-weight:bold;
}

.topControls{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:40px;
}

.reminderButton{
background:#222;
color:white;
border:1px solid #555;
padding:12px 18px;
border-radius:6px;
cursor:pointer;
font-size:14px;
display:none;
align-items:center;
gap:10px;
margin-left:8px;
}

.reminderButton.active{
background:#00aa66;
}

.countdown{
font-weight:bold;
color:#00ff88;
min-width:40px;
text-align:right;
}

.smallTimer{
background:#1b1b1b;
border:1px solid #555;
padding:10px 14px;
border-radius:6px;
font-size:13px;
display:none;
align-items:center;
gap:8px;
color:#ddd;
margin-left:8px;
max-width:100%;
box-sizing:border-box;
}

.smallTimer.ready{
background:#00aa66;
color:white;
}

.smallTimerTime{
font-weight:bold;
color:#00ff88;
}
</style>

<style>
@media (max-width: 600px){
body{
padding:15px;
}

h1{
font-size:22px;
margin-bottom:20px;
}

button{
width:100%;
font-size:18px;
padding:14px;
box-sizing:border-box;
}

.topControls{
flex-direction:column;
align-items:stretch;
gap:10px;
margin-bottom:25px;
}

.reminderButton{
width:100%;
justify-content:center;
margin-left:0;
box-sizing:border-box;
}

.smallTimer{
width:100%;
justify-content:center;
margin-left:0;
}

.title{
font-size:16px;
}

.time{
font-size:14px;
}
}
</style>
</head>

<body class="notranslate">


<h1>Temporizadores Age of Empires IV</h1>
<div style="text-align:center;margin-bottom:25px;">
<label style="margin-right:10px;font-weight:bold;">Civilización:</label>
<select id="civSelect" onchange="changeCiv()" style="padding:8px 12px;font-size:15px;border-radius:6px;">
<option value="generic">Genérico</option>
<option value="english">Ingleses</option>
<option value="french">Franceses</option>
<option value="rus">Rus</option>
<option value="hre">Sacro Imperio Romano</option>
<option value="mongols">Mongoles</option>
</select>
</div>

<div class="topControls">
<button onclick="startTimers()">⚔ Iniciar batalla</button>

<button class="reminderButton" id="reminderButton" onclick="toggleVillagerReminder()">
<span class="countdown" id="villagerCountdown">60</span>
👤 recordatorio creación de aldeanos
</button>

<div class="smallTimer" id="stoneWallTimer">
<span class="smallTimerTime" id="stoneWallCountdown">12:00</span>
🧱 muralla de piedra
</div>

<div class="smallTimer" id="secondTCTimer">
<span class="smallTimerTime" id="secondTCCountdown">7:30</span>
🏘 2º Town Center
</div>

<div class="smallTimer" id="ramPushTimer">
<span class="smallTimerTime" id="ramPushCountdown">9:00</span>
⚔️ push con arietes
</div>

<div class="smallTimer" id="farmTransitionTimer">
<span class="smallTimerTime" id="farmTransitionCountdown">10:00</span>
🌾 transición a granjas
</div>
<div class="smallTimer" id="relicTimer">
<span class="smallTimerTime" id="relicCountdown">11:30</span>
⛪ capturar reliquias
</div>
</div>

<div id="timers"></div>


<script>

let civ = "generic";

const civExtraTimings = {
generic: {
stoneWall: 720,
secondTC: 450,
ramPush: 540,
farmTransition: 600,
relic: 690
},
english: {
stoneWall: 690,
secondTC: 420,
ramPush: 510,
farmTransition: 570,
relic: 660
},
french: {
stoneWall: 660,
secondTC: 390,
ramPush: 480,
farmTransition: 600,
relic: 690
},
rus: {
stoneWall: 750,
secondTC: 450,
ramPush: 540,
farmTransition: 630,
relic: 660
},
hre: {
stoneWall: 720,
secondTC: 420,
ramPush: 510,
farmTransition: 570,
relic: 600
},
mongols: {
stoneWall: 0,
secondTC: 420,
ramPush: 450,
farmTransition: 540,
relic: 660
}
};

const civTimings = {
generic:[
{ name:"Click a Edad Feudal", time:240 },
{ name:"Llegar a Edad Feudal", time:330 },
{ name:"Primer edificio militar", time:360 },
{ name:"Ventana de ataque temprano", time:420 },
{ name:"Click a Edad de los Castillos", time:540 },
{ name:"Llegar a Edad de los Castillos", time:660 },
{ name:"Click a Edad Imperial", time:900 },
{ name:"Llegar a Edad Imperial", time:1020 }
],

english:[
{ name:"Click a Edad Feudal", time:230 },
{ name:"Llegar a Edad Feudal", time:300 },
{ name:"Primer edificio militar", time:330 },
{ name:"Ventana de ataque temprano", time:360 },
{ name:"Click a Edad de los Castillos", time:540 },
{ name:"Llegar a Edad de los Castillos", time:660 },
{ name:"Click a Edad Imperial", time:900 },
{ name:"Llegar a Edad Imperial", time:1020 }
],

french:[
{ name:"Click a Edad Feudal", time:225 },
{ name:"Llegar a Edad Feudal", time:295 },
{ name:"Primer edificio militar", time:320 },
{ name:"Ventana de ataque temprano", time:350 },
{ name:"Click a Edad de los Castillos", time:540 },
{ name:"Llegar a Edad de los Castillos", time:660 },
{ name:"Click a Edad Imperial", time:900 },
{ name:"Llegar a Edad Imperial", time:1020 }
],

rus:[
{ name:"Click a Edad Feudal", time:235 },
{ name:"Llegar a Edad Feudal", time:305 },
{ name:"Primer edificio militar", time:360 },
{ name:"Ventana de ataque temprano", time:420 },
{ name:"Click a Edad de los Castillos", time:480 },
{ name:"Llegar a Edad de los Castillos", time:600 },
{ name:"Click a Edad Imperial", time:900 },
{ name:"Llegar a Edad Imperial", time:1020 }
],

hre:[
{ name:"Click a Edad Feudal", time:235 },
{ name:"Llegar a Edad Feudal", time:305 },
{ name:"Primer edificio militar", time:360 },
{ name:"Ventana de ataque temprano", time:420 },
{ name:"Click a Edad de los Castillos", time:450 },
{ name:"Llegar a Edad de los Castillos", time:570 },
{ name:"Click a Edad Imperial", time:900 },
{ name:"Llegar a Edad Imperial", time:1020 }
],

mongols:[
{ name:"Click a Edad Feudal", time:220 },
{ name:"Llegar a Edad Feudal", time:285 },
{ name:"Primer edificio militar", time:310 },
{ name:"Ventana de ataque temprano", time:330 },
{ name:"Click a Edad de los Castillos", time:540 },
{ name:"Llegar a Edad de los Castillos", time:660 },
{ name:"Click a Edad Imperial", time:900 },
{ name:"Llegar a Edad Imperial", time:1020 }
]

};

let events = civTimings[civ];

let startTime;
let interval;
let villagerReminderActive = false;
let villagerInterval;
let villagerCountdown = 60;
let villagerCountdownInterval;
let stoneWallTime = civExtraTimings[civ].stoneWall;
let stoneWallInterval;

let secondTCTime = civExtraTimings[civ].secondTC;
let secondTCInterval;

let ramPushTime = civExtraTimings[civ].ramPush;
let ramPushInterval;

let farmTransitionTime = civExtraTimings[civ].farmTransition;
let farmTransitionInterval;

let relicTime = civExtraTimings[civ].relic;
let relicInterval;

function startTimers(){

startTime = Date.now()

createTimers()

document.getElementById("reminderButton").style.display = "flex";
document.getElementById("stoneWallTimer").style.display = "flex";
document.getElementById("secondTCTimer").style.display = "flex";
document.getElementById("ramPushTimer").style.display = "flex";
document.getElementById("farmTransitionTimer").style.display = "flex";
document.getElementById("relicTimer").style.display = "flex";

const extraTimings = civExtraTimings[civ];

secondTCTime = extraTimings.secondTC;
ramPushTime = extraTimings.ramPush;
farmTransitionTime = extraTimings.farmTransition;
relicTime = extraTimings.relic;
stoneWallTime = extraTimings.stoneWall;

updateSecondTCLabel();
updateRamPushLabel();
updateFarmTransitionLabel();
updateRelicLabel();
updateStoneWallLabel();
updateExtraTimerVisibility();

if(secondTCInterval) clearInterval(secondTCInterval);
if(ramPushInterval) clearInterval(ramPushInterval);
if(farmTransitionInterval) clearInterval(farmTransitionInterval);

secondTCInterval = setInterval(()=>{
secondTCTime--;
if(secondTCTime <= 0){
clearInterval(secondTCInterval);
document.getElementById("secondTCTimer").classList.add("ready");
document.getElementById("secondTCCountdown").innerText = "LISTO";
playSecondTCSound();
return;
}
updateSecondTCLabel();
},1000);

ramPushInterval = setInterval(()=>{
ramPushTime--;
if(ramPushTime <= 0){
clearInterval(ramPushInterval);
document.getElementById("ramPushTimer").classList.add("ready");
document.getElementById("ramPushCountdown").innerText = "LISTO";
playRamPushSound();
return;
}
updateRamPushLabel();
},1000);

farmTransitionInterval = setInterval(()=>{
farmTransitionTime--;
if(farmTransitionTime <= 0){
clearInterval(farmTransitionInterval);
document.getElementById("farmTransitionTimer").classList.add("ready");
document.getElementById("farmTransitionCountdown").innerText = "LISTO";
playFarmTransitionSound();
return;
}
updateFarmTransitionLabel();
},1000);

if(relicInterval) clearInterval(relicInterval);

relicInterval = setInterval(()=>{

relicTime--;

if(relicTime <= 0){
clearInterval(relicInterval);
document.getElementById("relicTimer").classList.add("ready");
document.getElementById("relicCountdown").innerText = "LISTO";
playRelicSound();
return;
}

updateRelicLabel();

},1000);

if(stoneWallInterval) clearInterval(stoneWallInterval);

stoneWallInterval = setInterval(()=>{

if(stoneWallTime <= 0){
clearInterval(stoneWallInterval);
return;
}

stoneWallTime--;

if(stoneWallTime <= 0){
clearInterval(stoneWallInterval);
document.getElementById("stoneWallTimer").classList.add("ready");
document.getElementById("stoneWallCountdown").innerText = "LISTO";
playWallSound();
return;
}

updateStoneWallLabel();

},1000);

villagerCountdown = 60;
document.getElementById("villagerCountdown").innerText = villagerCountdown;

if(!villagerReminderActive){
  toggleVillagerReminder();
}

if(interval) clearInterval(interval)

interval = setInterval(updateTimers,1000)

}

function updateExtraTimerVisibility(){
const stoneWallTimer = document.getElementById("stoneWallTimer");

if(civ === "mongols"){
stoneWallTimer.style.display = "none";
}else{
stoneWallTimer.style.display = "flex";
}
}

function changeCiv(){
const select = document.getElementById("civSelect");
civ = select.value;
events = civTimings[civ];

stoneWallTime = civExtraTimings[civ].stoneWall;
secondTCTime = civExtraTimings[civ].secondTC;
ramPushTime = civExtraTimings[civ].ramPush;
farmTransitionTime = civExtraTimings[civ].farmTransition;
relicTime = civExtraTimings[civ].relic;

createTimers();
updateSecondTCLabel();
updateRamPushLabel();
updateFarmTransitionLabel();
updateRelicLabel();
updateStoneWallLabel();
updateExtraTimerVisibility();
}

function createTimers(){

const container = document.getElementById("timers")
container.innerHTML=""

events.forEach(e=>{

container.innerHTML += `
<div class="timer">
<div class="title">${e.name}</div>
<div class="barContainer">
<div class="bar" id="bar-${e.time}"></div>
</div>
<div class="time" id="time-${e.time}"></div>
</div>
`

})

}

function updateTimers(){

const elapsed = (Date.now()-startTime)/1000

events.forEach(e=>{

const remaining = e.time - elapsed

const percent = Math.max(0,(remaining/e.time)*100)

const bar = document.getElementById("bar-"+e.time)
const label = document.getElementById("time-"+e.time)

if(bar) bar.style.width = percent+"%"

if(label){

if(remaining>0){

const min = Math.floor(remaining/60)
const sec = Math.floor(remaining%60)

label.innerText = `faltan ${min}:${sec.toString().padStart(2,"0")}`

}else{

if(!label.dataset.done){
label.dataset.done = "true";
label.innerHTML = `<span class="ready">LISTO</span>`;

if(e.name === "Primer edificio militar"){
playMilitaryBuildingSound();
}
else if(e.name === "Ventana de ataque temprano"){
playEarlyAttackSound();
}
else{
playAgeSound();
}

}

}

}

})

}

function toggleVillagerReminder(){

const button = document.getElementById("reminderButton")
const label = document.getElementById("villagerCountdown")

villagerReminderActive = !villagerReminderActive

if(villagerReminderActive){

button.classList.add("active")
villagerCountdown = 60
label.innerText = villagerCountdown

playBell()

villagerInterval = setInterval(playBell,60000)

villagerCountdownInterval = setInterval(()=>{

villagerCountdown--

if(villagerCountdown <= 0){
villagerCountdown = 60
}

label.innerText = villagerCountdown

},1000)

}else{

button.classList.remove("active")
clearInterval(villagerInterval)
clearInterval(villagerCountdownInterval)

}

}

function playBell(){
playMedievalChime([880, 1320, 1760], 0.22, 0.9, "bright");
}

function playAgeSound(){
playMedievalChime([659.25, 987.77, 1318.51], 0.24, 1.05, "bright");
}

function playMilitaryBuildingSound(){
playMedievalChime([392, 587.33, 783.99], 0.24, 0.95, "metal");
}

function playEarlyAttackSound(){
playMedievalChime([293.66, 440, 659.25], 0.26, 0.75, "warn");
}

function playWallSound(){
playMedievalChime([349.23, 523.25, 698.46], 0.24, 1.1, "metal");
}

function playSecondTCSound(){
playMedievalChime([523.25, 783.99, 1046.5], 0.23, 1, "bright");
}

function playRamPushSound(){
playMedievalChime([246.94, 369.99, 493.88], 0.28, 0.8, "warn");
}

function playFarmTransitionSound(){
playMedievalChime([587.33, 880, 1174.66], 0.17, 1.15, "soft");
}

function playRelicSound(){
playMedievalChime([440, 659.25, 880], 0.2, 1.25, "holy");
}

function playMedievalChime(frequencies, volume = 0.22, duration = 1, profile = "bright"){

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = audioCtx.createGain();
masterGain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
masterGain.gain.exponentialRampToValueAtTime(volume, audioCtx.currentTime + 0.01);
masterGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
masterGain.connect(audioCtx.destination);

const profileSettings = {
bright: {
partials: [1, 2.01, 3.98],
types: ["triangle", "sine", "sine"],
gains: [1, 0.32, 0.14],
detunes: [0, 4, -6]
},
metal: {
partials: [1, 2.7, 4.15],
types: ["triangle", "sine", "sine"],
gains: [1, 0.26, 0.12],
detunes: [0, -8, 11]
},
warn: {
partials: [1, 1.5, 3.1],
types: ["square", "triangle", "sine"],
gains: [1, 0.2, 0.08],
detunes: [0, -5, 7]
},
soft: {
partials: [1, 2, 3],
types: ["sine", "triangle", "sine"],
gains: [1, 0.2, 0.06],
detunes: [0, 3, -4]
},
holy: {
partials: [1, 2, 2.5],
types: ["sine", "triangle", "sine"],
gains: [1, 0.24, 0.1],
detunes: [0, 5, -3]
}
};

const selectedProfile = profileSettings[profile] || profileSettings.bright;

frequencies.forEach((baseFrequency, noteIndex) => {
selectedProfile.partials.forEach((partial, partialIndex) => {
const oscillator = audioCtx.createOscillator();
const noteGain = audioCtx.createGain();

oscillator.type = selectedProfile.types[partialIndex];
oscillator.frequency.setValueAtTime(baseFrequency * partial, audioCtx.currentTime);
oscillator.detune.setValueAtTime(selectedProfile.detunes[partialIndex], audioCtx.currentTime);

const startAt = audioCtx.currentTime + noteIndex * 0.08;
const endAt = startAt + duration - noteIndex * 0.08;
const partialVolume = volume * selectedProfile.gains[partialIndex] / frequencies.length;

noteGain.gain.setValueAtTime(0.0001, startAt);
noteGain.gain.exponentialRampToValueAtTime(partialVolume, startAt + 0.01);
noteGain.gain.exponentialRampToValueAtTime(0.0001, endAt);

oscillator.connect(noteGain);
noteGain.connect(masterGain);

oscillator.start(startAt);
oscillator.stop(endAt);
});
});

}

function updateStoneWallLabel(){

const min = Math.floor(stoneWallTime/60);
const sec = stoneWallTime%60;

const label = document.getElementById("stoneWallCountdown");

label.innerText = `${min}:${sec.toString().padStart(2,"0")}`;

}

function updateSecondTCLabel(){
const min = Math.floor(secondTCTime/60);
const sec = secondTCTime % 60;
document.getElementById("secondTCCountdown").innerText = `${min}:${sec.toString().padStart(2,"0")}`;
}

function updateRamPushLabel(){
const min = Math.floor(ramPushTime/60);
const sec = ramPushTime % 60;
document.getElementById("ramPushCountdown").innerText = `${min}:${sec.toString().padStart(2,"0")}`;
}

function updateFarmTransitionLabel(){
const min = Math.floor(farmTransitionTime/60);
const sec = farmTransitionTime % 60;
document.getElementById("farmTransitionCountdown").innerText = `${min}:${sec.toString().padStart(2,"0")}`;
}

function updateRelicLabel(){
const min = Math.floor(relicTime/60);
const sec = relicTime % 60;
document.getElementById("relicCountdown").innerText = `${min}:${sec.toString().padStart(2,"0")}`;
}

</script>
